name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main  # หรือชื่อ Branch ที่คุณใช้งาน

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

- name: clasp push
        # แก้ไขบรรทัดข้างล่างนี้
        uses: google/clasp-action@main 
        with:
          command: push
          scriptId: ${{ secrets.SCRIPT_ID }}
          # ตรวจสอบให้แน่ใจว่าใช้ชื่อ secrets ตรงกับที่ตั้งไว้
          claspToken: ${{ secrets.CLASP_TOKEN }}
